<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Task Management</title>

    <!--
      Google Fonts — Plus Jakarta Sans
      preconnect hints tell the browser to open the DNS/TCP connections early
      so the font file starts downloading before the CSS parser reaches the <link>.
      Weights loaded: 400 (regular), 500 (medium), 600 (semibold), 700 (bold).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- React mounts the entire app into this div -->
    <div id="root"></div>

    <!-- Vite serves main.jsx as an ES module; it handles HMR in development -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
